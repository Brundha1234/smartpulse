name: smartpulse
description: SmartPulse v2 - Smartphone Addiction Prediction System
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0

  # State Management
  provider: ^6.1.2

  # Backend API
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.2.3

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Permissions
  permission_handler: ^11.3.1

  # Misc
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

# App icon configuration
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/spicon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#1E3A8A"
  adaptive_icon_foreground: "assets/images/spicon.jpeg"
